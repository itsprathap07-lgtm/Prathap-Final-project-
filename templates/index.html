<!DOCTYPE html>
<html>
  <head>
    <title>Chat Bot</title>
    <style>
      body{
        background-color:plum;
        align-items:center;
        justify-content:center;

      }
      .box{
       margin-top: 50px;
        height: 700px;
        width: 450px;
        background-color:palegreen;
        align-items:bottom;
        border-radius: 20px;
       
        padding: 50px;
        margin-bottom: 50px;
      }

       input{
        margin-top: 400px;
        height: 50px;
        width: 300px;
        border-radius: 20px;
        border:none;
        padding: 10px;
      }
      button{
        height: 50px;
        width: 100px;
        border-radius: 20px;
        border: none;
        background-color:blue;
        color:white;
      }
      h2{
        color: white;
        background-color: black;
        padding: 10px; 
        border-radius: 10px;
      }
      h1{
        color:blue;
      }

    </style>
  </head>
  <body>

  <center>
    
   <div class="box">
    <h1>CHAT BOT</h1>
    	{% if  message %}
	  <h3>output:</h3>

	  <h2>{{message}}</h2>
        {%endif%}
    <form method="POST">
    <input type="text" name="prompt">
    <button type="submit">submit</button>
</form>
</div>
  </center>



  </body>
</html>
